name: Daily Pipeline

# ⚠️  CRON DISABLED — 2026-05-14
# El cron viejo corría `python -m pipeline.run` que usa los collectors
# obsoletos (MiamiDadeForeclosureCollector vía RealAuction, etc) y
# SOBREESCRIBÍA `data/leads.csv` con ~30 leads, borrando los 275 que
# venimos enriqueciendo desde MLS Matrix + PA + Clerk.
#
# Hasta que armemos un cron nuevo basado en el flujo de Matrix CSV
# (que respete los leads existentes y solo agregue los nuevos del día),
# el cron está desactivado. Solo se puede correr a mano desde la
# pestaña Actions con workflow_dispatch si fuera necesario.
on:
  # schedule:
  #   - cron: "0 10 * * *"   # ← DESACTIVADO, ver nota arriba
  workflow_dispatch: {}        # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write              # necesario para que el bot commitee data/leads.csv

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          BATCH_SKIP_API_KEY: ${{ secrets.BATCH_SKIP_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_LABEL: ${{ secrets.GMAIL_LABEL }}
        run: |
          python -m pipeline.run

      - name: Commit updated data
        run: |
          git config user.name "101advisors-bot"
          git config user.email "bot@101advisors.local"
          git add data/leads.csv data/history.csv data/state.sqlite || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(pipeline): daily update $(date -u +'%Y-%m-%d')"
            git push
          fi
